<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Social Links Profile</title>
    <!-- ===== Icon! ===== -->
    <link rel="icon" href="./images/favicon-32x32.png" type="image/x-icon" />
    <!-- ===== Fonts! ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- ===== Styles! ===== -->
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <!-- ===== Main! ===== -->
    <main>
      <section class="profile">
        <img
          src="./images/avatar-jessica.jpeg"
          alt="Avatar of Jessica Randall"
          class="profile-picture"
        />
        <h1>Jessica Randall</h1>
        <span>London, United Kingdom</span>
        <p>"Front-end developer and avid reader."</p>
        <ul>
          <li><a href="https://github.com/rubio-fe">GitHub</a></li>
          <li>
            <a href="https://www.frontendmentor.io/profile/rubio-fe"
              >Frontend Mentor</a
            >
          </li>
          <li><a href="#">LinkedIn</a></li>
          <li><a href="#">Twitter</a></li>
          <li><a href="#">Instagram</a></li>
        </ul>
      </section>
    </main>
    <!-- ===== Footer! ===== -->
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io">Frontend Mentor</a>. Coded by
      <a href="https://github.com/rubio-fe">Rubio</a>.
    </footer>
  </body>
</html>
